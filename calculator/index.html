<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>

    <h2>A Simple Calculator</h2>
<!-- inputs -->
 <div class="input-area">
    <label for="input1">First Value</label>
    <input type="number" id="input1" placeholder="Enter first number">
    <label for="input2">Second Value</label>
    <input type="number" id="input2" placeholder="Enter second number">
 </div>
<!-- operation buttons -->
 <div id="controls">
    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">*</button>
    <button onclick="calculate('/')">/</button>
 </div>

 <!-- result section -->
 <div class="result">
      <h3>Result: 0</h3>
 </div>

 <!-- History of calculations -->
  <div class="history">
    <h3>Recent Calculations</h3>
    <ul></ul>
  </div>

  <script src="index.js"></script>
  
</body>
</html>
